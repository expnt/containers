image_name: python
tag_pattern: "{base_version}"
versions:
  - base_version: "3.12"
  - base_version: "3.13-slim-bullseye"
  - base_version: "3.12.3"
  - base_version: "3.13.5-bookworm"
  - base_version: "3.9-slim"
  - base_version: "3.11-slim"
watch:
  - pattern: ^\d+\.\d+$
    source: docker.io/library/python
    target: base_version
    type: docker
  - pattern: ^\d+\.\d+-slim-bullseye$
    source: docker.io/library/python
    target: base_version
    type: docker
  - pattern: ^\d+\.\d+\.\d+$
    source: docker.io/library/python
    target: base_version
    type: docker
  - pattern: ^\d+\.\d+\.\d+-bookworm$
    source: docker.io/library/python
    target: base_version
    type: docker
  - pattern: ^\d+\.\d+-slim$
    source: docker.io/library/python
    target: base_version
    type: docker
