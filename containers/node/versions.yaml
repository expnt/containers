image_name: node
tag_pattern: "{base_version}"
versions:
  - base_version: "22-alpine"
  - base_version: "22-slim"
  - base_version: "22-bullseye"
  - base_version: "18-buster"
  - base_version: "20-bullseye-slim"
watch:
  - pattern: ^(\d+)-alpine$
    source: docker.io/library/node
    target: base_version
    type: docker
  - pattern: ^(\d+)-slim$
    source: docker.io/library/node
    target: base_version
    type: docker
  - pattern: ^(\d+)-bullseye$
    source: docker.io/library/node
    target: base_version
    type: docker
  - pattern: ^(\d+)-buster$
    source: docker.io/library/node
    target: base_version
    type: docker
  - pattern: ^(\d+)-bullseye-slim$
    source: docker.io/library/node
    target: base_version
    type: docker
