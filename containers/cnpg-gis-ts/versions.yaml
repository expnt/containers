image_name: cnpg-gis-ts
tag_pattern: "{base_version}-plugin-v{plugin_version}"
versions:
  - base_version: "17"
    plugin_version: 2.22.0
  - base_version: "16"
    plugin_version: 2.22.0
  - base_version: "17"
    plugin_version: 2.21.0
  - base_version: "16"
    plugin_version: 2.21.0
  - base_version: "17"
    plugin_version: 2.20.0
  - base_version: "16"
    plugin_version: 2.20.0
  - base_version: "17"
    plugin_version: 2.19.0
  - base_version: "16"
    plugin_version: 2.19.0
watch:
  - pattern: ^(16|17)$
    source: ghcr.io/cloudnative-pg/postgresql
    target: base_version
    type: docker
  - pattern: ^\d+\.\d+\.\d+$
    source: timescale/timescaledb
    target: plugin_version
    type: github
